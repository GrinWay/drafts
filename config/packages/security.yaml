when@dev: &when_dev
    security:
        firewalls:
            main:
                form_login:
                    enable_csrf: false
        password_hashers:
            admin_hasher:
                algorithm: auto
                cost: 5
                migrate_from:
                -   no_hash
            
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
when@test: *when_dev

security:
    
    access_decision_manager:
        
    role_hierarchy:
        
        ROLE_ADMIN:
        -   ROLE_USER
        
        ROLE_OWNER:
        -   ROLE_ADMIN
    
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        
        # Named hasher
        no_hash:
            id: 'App\Security\PasswordHasher\NoHashPasswordHasher'
        
        # Named hasher
        low_cost_bcrypt:
            algorithm: bcrypt
            cost: 7
            
        # Named hasher
        admin_hasher:
            algorithm: auto
            cost: 14
            migrate_from:
            -   no_hash
        
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: auto
            cost: 4
            
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern:
                - ^/_profiler/
                - ^/_wdt/
                - ^/css/
                - ^/images/
                - ^/js/
            security: false
        main:
            pattern: '^/'
            host: '^127[.]0[.]0[.]1$'
            methods:
            -   GET
            -   POST
            request_matcher: App\Security\RequestMatcher\CustomRequestMatcher
            
            user_checker: security.user_checker.chain.main
            
            entry_point: 'App\Security\ProtectedResourceHandler\EntryPoint\ExceptionDependedEntryPoint'
            access_denied_handler: 'App\Security\ProtectedResourceHandler\AccessDenied\DefaultAccessDeniedHandler'
            
            lazy: true
            #pattern: '.*'
            provider: app_user_provider
            
            login_throttling:
                max_attempts: 10
                #interval: '5 seconds'
            
            remember_me:
                lifetime: '%app.remember_me.cookie_lifetime%'
                name: REMEMBERME_MAIN
                always_remember_me: true
                remember_me_parameter: _remember_me
                
                secret: '%env(APP_ENV)%'
                signature_properties:
                -   passport.rememberMeUpdatedAt
                -   email
                -   password
                
            form_login:
                enable_csrf: true
                # Redirect if denied
                #login_path: app_login
                # Для перехвата аутентификатором
                check_path: app_login
                #remember_me: false
                
                csrf_parameter: '%app.csrf_name%'
                csrf_token_id: youWillNotHackMe
                
                #success_handler: 'App\Security\Handler\FormLogin\SuccessHandler'
                #failure_handler: 'App\Security\Handler\FormLogin\FailureHandler'
                #failure_path: 'app_home_home'
                
                default_target_path: 'app_home_home'
                always_use_default_target_path: false
                #use_referer: true
                
            custom_authenticators:
            -   App\Security\Authenticator\FormLoginAuthenticator
            
            http_basic:
                realm: 'Secured Area'
                
            #remote_user:
                #provider: ~
                #user: APP_REMOTE_USER
            
            #access_token:
            #    realm: ~
            
            login_link:
                login_path: app_login
                check_route: app_login_link
                check_post_only: false
                signature_properties:
                -   email
                -   password
                lifetime: 600
                max_uses: 5
                always_use_default_target_path: false
                default_target_path: app_home_home
            
            json_login:
                login_path: app_login
                check_path: app_json_login
                username_path: username
                password_path: password
            
            logout:
                path: app_logout
                target: app_login

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            switch_user:
                target_route: app_home_home
                role: VOTE_SWITCH_USER
                parameter: 'X-Switch-User'
    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:

    -   path: ^/(?:login|register)
        roles:
        -   PUBLIC_ACCESS
        requires_channel: '%env(APP_REQUIRED_SCHEME)%'
        
    -   request_matcher: 'App\Security\RequestMatcher\IpRangeRequestMatcher'
        #request_matcher: !service // TODO: current
        #    class: 'App\Security\RequestMatcher\IpRangeRequestMatcher'
        #    arguments:
        #        $minIdx3: 0
        #        $maxIdx3: 10
        requires_channel: '%env(APP_REQUIRED_SCHEME)%'
        
    -   path: ^/
        roles:
        -   VOTE_PUBLIC_ACCESS
        #allow_if: 'get("ROLE_USER")'
        requires_channel: '%env(APP_REQUIRED_SCHEME)%'